---
layout: page_no_right
---
<div class="pdf-section">
    <div class="pdf-controls">
        <button onclick="downloadPDF()" class="download-button">
            <i class="fas fa-download"></i> Download PDF
        </button>
    </div>
    <div class="pdf-container">
        <iframe id="pdf-viewer" width="100%" height="800px" frameborder="0">
        </iframe>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxjEVrP27dPrPXqhflAUwKPduVCOV4kw5rN9GeNJAuQ4NcTl2CVz7YLt11AOkkEDNyo/exec';

    // Charge le PDF automatiquement dans l'iframe
    async function loadPDF() {
        try {
            const response = await fetch(APPS_SCRIPT_URL);
            const data = await response.json();

            const bytes = Uint8Array.from(atob(data.pdf), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);

            document.getElementById('pdf-viewer').src = url;
        } catch (error) {
            console.error('Erreur chargement PDF:', error);
        }
    }

    // Télécharge le PDF
    async function downloadPDF() {
        try {
            const response = await fetch(APPS_SCRIPT_URL);
            const data = await response.json();

            const bytes = Uint8Array.from(atob(data.pdf), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = 'CV_BAM241.pdf';
            a.click();
        } catch (error) {
            console.error('Erreur téléchargement:', error);
        }
    }

    // Charge le PDF au chargement de la page
    loadPDF();
</script>
