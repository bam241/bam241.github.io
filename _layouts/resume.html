<div class="pdf-section">
    <div class="pdf-controls">
        <a href="#" onclick="downloadPDF(); return false;" class="cta-button">
            <i class="fas fa-download"></i> Download Resume
        </a>
    </div>
    <div class="pdf-container">
        <iframe id="pdf-viewer" width="100%" height="800px" frameborder="0">
        </iframe>
    </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<script>
    /**
     * Loads the PDF into the iframe viewer.
     * Uses the sessionStorage cache via window.getPDFData() if available,
     * otherwise fetches fresh from the Apps Script URL.
     */
    async function loadPDF() {
        try {
            const base64 = await window.getPDFData();
            document.getElementById('pdf-viewer').src = window.base64ToObjectURL(base64);
        } catch (error) {
            console.error('Erreur chargement PDF:', error);
        }
    }

    /**
     * Triggers a download of the PDF file.
     * Reuses the same cached data as the viewer via window.getPDFData()
     * to avoid a second network fetch.
     */
    async function downloadPDF() {
        try {
            const base64 = await window.getPDFData();
            const url = window.base64ToObjectURL(base64);

            const a = document.createElement('a');
            a.href = url;
            a.download = 'CV_BAM241.pdf';
            a.click();
        } catch (error) {
            console.error('Erreur téléchargement:', error);
        }
    }

    loadPDF();
</script>
