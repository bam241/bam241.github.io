---
layout: page_no_right
---
<div class="pdf-section">
    <div class="pdf-controls">
        <a href="#" onclick="downloadPDF(); return false;" class="cta-button">
            <i class="fas fa-download"></i> Download Resume
        </a>
    </div>
    <div class="pdf-container">
        <iframe id="pdf-viewer" width="100%" height="800px" frameborder="0">
        </iframe>
    </div>
</div>

<!-- Add Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<script>
    const APPS_SCRIPT_URL = '{{ site.apps_script_url }}';

    async function loadPDF() {
        try {
            const response = await fetch(APPS_SCRIPT_URL, { redirect: 'follow' });
            const data = await response.json();

            const bytes = Uint8Array.from(atob(data.pdf), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);

            document.getElementById('pdf-viewer').src = url;
        } catch (error) {
            console.error('Erreur chargement PDF:', error);
        }
    }

    async function downloadPDF() {
        try {
            const response = await fetch(APPS_SCRIPT_URL, { redirect: 'follow' });
            const data = await response.json();

            const bytes = Uint8Array.from(atob(data.pdf), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = 'CV_BAM241.pdf';
            a.click();
        } catch (error) {
            console.error('Erreur téléchargement:', error);
        }
    }

    loadPDF();
</script>
