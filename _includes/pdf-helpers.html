{% if site.apps_script_url %}
<script>
    (function () {
        const CACHE_KEY = 'resume_pdf_cache';
        const APPS_SCRIPT_URL = '{{ site.apps_script_url }}';

        /**
         * Fetches the PDF base64 string, using sessionStorage cache if available.
         * Falls back to a live fetch if the cache is empty.
         *
         * @returns {Promise<string>} Resolves with the base64 PDF string.
         */
        window.getPDFData = async function () {
            const cached = sessionStorage.getItem(CACHE_KEY);
            if (cached) return cached;

            const response = await fetch(APPS_SCRIPT_URL, { redirect: 'follow' });
            const data = await response.json();

            if (data && data.pdf) {
                sessionStorage.setItem(CACHE_KEY, data.pdf);
            }

            return data.pdf;
        };

        /**
         * Converts a base64 PDF string into a blob object URL.
         *
         * @param   {string} base64 - The base64 encoded PDF string.
         * @returns {string} The created blob object URL.
         */
        window.base64ToObjectURL = function (base64) {
            const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: 'application/pdf' });
            return URL.createObjectURL(blob);
        };

    })();
</script>
{% endif %}
